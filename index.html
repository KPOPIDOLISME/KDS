<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-POP'S DREAM STAGE (KDS)</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0d0d0d,#2b0b45);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      text-align:center;
      background:rgba(255,255,255,0.08);
      padding:40px;
      border-radius:20px;
      width:90%;
      max-width:450px;
      box-shadow:0 0 30px rgba(180,0,255,0.4);
    }

    h1{
      font-size:32px;
      margin-bottom:10px;
    }

    h2{
      color:#d28cff;
      margin-bottom:20px;
    }

    p{
      color:#dddddd;
      margin-bottom:30px;
      line-height:1.5;
    }

    button{
      width:100%;
      padding:15px;
      margin:10px 0;
      border:none;
      border-radius:12px;
      background:#a100ff;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:.3s;
    }

    button:hover{
      background:#c13cff;
    }

    .footer{
      margin-top:25px;
      font-size:13px;
      color:#bdbdbd;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>🎤 KDS</h1>

  <h2>K-POP'S DREAM STAGE</h2>

  <p>
    Train your vocals, dance, rap, stage presence and Korean with your
    own personalized AI Idol Coach.
  </p>

  <button>🚀 Get Started</button>

  <button>🔑 Login</button>

  <div class="footer">
    © 2026 KDS • Dream. Practice. Shine.
  </div>

</div>

</body>
</html>
